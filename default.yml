# # # # # # # # # # # # # # # # # # # # # # # # # # # # # #
#
# default.yml
#
# Use this global manifest (`default.yml`) to configure
# top-level settings for your organization as a whole, and
# controls/reports/etc that apply to all of your fleets.
#
# To see all supported options, check out:
#   ŌĆó https://fleetdm.com/docs/configuration/yaml-files
#
# # # # # # # # # # # # # # # # # # # # # # # # # # # # # #

org_settings:
  org_info:
    ###########################################################
    # The name of your organization is displayed to end users
    # during the setup experience for new hardware, and to admins
    # in the Fleet UI.
    #
    # Read more:
    #   ŌĆó https://fleetdm.com/docs/configuration/yaml-files#org-info
    ###########################################################
    org_name: My organization

  server_settings:
    ###########################################################
    # The server URL where Fleet is running.
    #
    # Note: This is configured as a repository "secret" just so
    # that it can be more easily used in the CI/CD workflow
    # configurations.
    ###########################################################
    server_url: $FLEET_URL

  ###########################################################
  # Uncomment to use single sign-on (SSO) for admins accessing Fleet.
  #
  # Read more:
  #   ŌĆó https://fleetdm.com/docs/configuration/yaml-files#sso-settings
  #   ŌĆó https://fleetdm.com/docs/deploy/single-sign-on-sso
  ###########################################################
  # sso_settings:
  #   idp_name: "Okta" # e.g. "Entra", "Okta", "Google Workspace", etc.  (This appears to admins on the login screen as a "Sign in with ________" button.)
  #   metadata_url: "https://okta.com/replace-this-url" # This must exactly match the "IdP metadata URL" provided by your identity provider (IdP) when setting up this integration.
  #   entity_id: "fleet-admins" # This must exactly match the "Entity ID" field you chose when setting up this integration in your identity provider (IdP).

  mdm:
    ###########################################################
    # Uncomment to use single sign-on (SSO) to authenticate
    # new computers enrolling in Fleet during end user setup.
    #
    # Read more:
    #   ŌĆó https://fleetdm.com/docs/configuration/yaml-files#end-user-authentication
    #   ŌĆó https://fleetdm.com/guides/setup-experience#end-user-authentication
    ###########################################################
    # end_user_authentication:
    #   idp_name: "Okta"  # e.g. "Entra", "Okta", "Google Workspace", etc. (Displayed to end users.)
    #   metadata_url: "https://okta.com/replace-this-url" # This must exactly match the "IdP metadata URL" provided by your identity provider (IdP) when setting up this integration.
    #   entity_id: "fleet-end-users" # This must exactly match the "Entity ID" field you chose when setting up this integration in your identity provider (IdP).

    ###########################################################
    # Uncomment when you are ready to start using zero-touch enrollment
    # for Apple devices via Apple Business (AB).
    #
    # Read more:
    #   ŌĆó https://fleetdm.com/docs/configuration/yaml-files#apple-business-manager
    #   ŌĆó https://fleetdm.com/guides/apple-mdm-setup#apple-business-manager-abm
    ###########################################################
    # apple_business:
    #   - organization_name: "My Company, Inc." # This must exactly match the organization name in Apple Business (AB).
    #     macos_fleet: "­¤Æ╗ Workstations" # Where new macOS devices from AB will appear

    ###########################################################
    # Uncomment to start using Apple's volume purchase program (VPP)
    # for making software available from the App Store and managing
    # software licenses.
    #
    # Read more:
    #   ŌĆó https://fleetdm.com/docs/configuration/yaml-files#volume-purchasing-program
    #   ŌĆó https://fleetdm.com/guides/apple-mdm-setup#volume-purchasing-program-vpp
    ###########################################################
    # volume_purchasing_program:
    #   - location: "My organization unit." # This must exactly match an "Organization Unit" name in Apple Business (AB). Apple previously called this "location." Fleet will rename it to "organization unit" in the next major version.
    #     fleets:
    #       - "­¤Æ╗ Workstations"
    #       - "­¤ō▒­¤öÉ Personal mobile devices"

controls:
  ###########################################################
  # Uncomment when you are ready to migrate Macs to Fleet
  # from a different MDM server, especially devices running
  # macOS Ōēżv26.
  #
  # For more information about what this does, see:
  #   ŌĆó https://fleetdm.com/docs/configuration/yaml-files#macos-migration
  #   ŌĆó https://fleetdm.com/guides/mdm-migration#end-user-workflow
  #
  # Note: This is a global setting that cannot be applied per-fleet.
  ###########################################################
  # macos_migration:
  #   enable: true
  #   mode: voluntary # Start with "voluntary", then change this to "forced" closer to the deadline.
  #   webhook_url: "https://your-custom-webhook-or-one-provided-off-the-shelf-by-fleet-for-the-mdm-you-are-coming-from.example.com/webhooks/receive-from-fleet"
  #   # ^ When end users click "Migrate to Fleet", this webhook is triggered.
  #   # By convention it looks up the device and unmanages it in the old MDM,
  #   # then enrolls the device in Fleet.  Unsure?  Get help @ fleetdm.com/support.

  ###########################################################
  # Uncomment when you are ready to start using Fleet's Windows MDM features.
  # 
  # Read more:
  #   ŌĆó https://fleetdm.com/guides/windows-mdm-setup
  ###########################################################
  # windows_enabled_and_configured: true


###########################################################
# Labels are static or dynamic groupings of computers for
# scoping, reporting, and more.  Use labels for everything
# from "x86 macs" to "finance department" to "needs new battery".
#
# For more, see:
#   ŌĆó https://fleetdm.com/docs/configuration/yaml-files#labels
#   ŌĆó https://fleetdm.com/guides/managing-labels-in-fleet
#
# (Optional) You can choose to manage labels in the Fleet GUI
# instead of in your git repo by **commenting out** `labels`
# below and removing the `labels/` folder.
#
# > Note: If you exclude `labels` from your git repo, then any
# > AI-assisted tools you may be using like Claude/Copilot/Kilocode
# > won't be able to see them as easily for use in scoping,
# > and could make it harder to do prompts like, for example:
# > "Make sure everyone in finance has the latest version of Excel"
###########################################################
labels:
  - paths: ./labels/*.yml

software:
  packages:
    # macOS apps
    - path: ../lib/macos/software/fleet-keynote-theme.yml # Fleet Keynote theme for macOS
      self_service: true
      labels_include_any:
        - "Keynote 14 installed"
      categories:
        - Productivity
    - path: ../lib/macos/software/nudge-assets.yml # Nudge assets for macOS
      self_service: false
      categories:
        - Utilities
    - path: ../lib/macos/software/fleet-desktop-launch-agent.yml
      self_service: false
      labels_include_any:
        - "Macs with Fleet Desktop.app launch agent MDM profile"
      categories:
        - Utilities
    - path: ../lib/macos/scripts/enable-touch-id-sudo.sh # Enable Touch ID for sudo
      display_name: "Enable Touch ID for sudo"
      self_service: true
