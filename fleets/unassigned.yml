name: "Unassigned hosts"
controls:
  setup_experience:
    ###########################################################
    # Uncomment to use single-sign on (SSO) to authenticate
    # end users enrolling their personal device.
    #
    # Read more:
    #   ‚ÄĘ https://fleetdm.com/docs/configuration/yaml-files#end-user-authentication
    #   ‚ÄĘ https://fleetdm.com/guides/setup-experience#end-user-authentication
    ###########################################################
    #  enable_end_user_authentication: true

  ###########################################################
  # Presets, restrictions, and configs
  #
  # > Since the mobile devices in this fleet are personal
  # > devices owned by employees, it can be appropriate to
  # > cherry-pick only a very limited set of restrictions
  # > and presets to maximize privacy and employee freedom.
  #
  # For more, see:
  #   ‚ÄĘ https://fleetdm.com/docs/configuration/yaml-files#apple-settings-and-windows-settings
  #   ‚ÄĘ https://fleetdm.com/docs/configuration/yaml-files#android-settings
  ###########################################################
  apple_settings:
    configuration_profiles:
      # ‚Ä¶ e.g.
      # - path: ../lib/ios/declaration-profiles/Passcode settings.json
      # - path: ../lib/ios/configuration-profiles/self-service.mobileconfig
  android_settings:
    configuration_profiles:
    certificates:

  ###########################################################
  # Managed OS updates
  #
  # To enable and enforce managed OS updates on iOS/iPadOS,
  # uncomment `ios_updates` and `ipados_updates`.
  #
  # See also:
  #   ‚ÄĘ https://fleetdm.com/docs/configuration/yaml-files#ios-updates
  #   ‚ÄĘ https://fleetdm.com/docs/configuration/yaml-files#ipados-updates
  #   ‚ÄĘ https://fleetdm.com/guides/enforce-os-updates#apple-macos-ios-and-ipados-end-user-experience
  ###########################################################
  # ios_updates:
  #   deadline: "2030-04-01"
  #   minimum_version: "18.5"
  # ipados_updates:
  #   deadline: "2030-04-01"
  #   minimum_version: "18.5"

###########################################################
# Apps to make available from the Apple App Store or Google Play
###########################################################
software:
  app_store_apps:
    ###########################################################
    # iOS apps
    ###########################################################
    - app_store_id: "618783545" # Slack
      display_name: "Slack"
      self_service: true
      setup_experience: true
      platform: ios
      categories:
        - "Communication"

    - app_store_id: "546505307" # Zoom - Zoom Cloud Meetings
      display_name: "Zoom"
      self_service: true
      setup_experience: true
      platform: ios
      categories:
        - "Communication"

    - app_store_id: "1113153706" # Microsoft Teams
      display_name: "Microsoft Teams"
      self_service: true
      setup_experience: true
      platform: ios
      categories:
        - "Communication"

    - app_store_id: "535886823" # Google Chrome
      display_name: "Google Chrome"
      self_service: true
      setup_experience: true
      platform: ios
      categories:
        - "Productivity"

    - app_store_id: "1511601750" # 1Password 8
      display_name: "1Password"
      self_service: true
      setup_experience: true
      platform: ios
      categories:
        - "Productivity"
        - "Business"

