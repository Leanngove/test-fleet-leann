name: Unassigned
controls:
  apple_settings:
    configuration_profiles:
  android_settings:
    configuration_profiles:
    certificates:
policies:
software:
  packages:
    # macOS apps
    - path: ../lib/macos/software/fleet-keynote-theme.yml # Fleet Keynote theme for macOS
      self_service: true
      labels_include_any:
        - "Keynote 14 installed"
      categories:
        - Productivity
    - path: ../lib/macos/software/nudge-assets.yml # Nudge assets for macOS
      self_service: false
      categories:
        - Utilities
    - path: ../lib/macos/software/fleet-desktop-launch-agent.yml
      self_service: false
      labels_include_any:
        - "Macs with Fleet Desktop.app launch agent MDM profile"
      categories:
        - Utilities
    - path: ../lib/macos/scripts/enable-touch-id-sudo.sh # Enable Touch ID for sudo
      display_name: "Enable Touch ID for sudo"
      self_service: true
      categories:
        - Security
      icon:
        path: ../lib/all/icons/touch-id.png
    # Linux apps
    - path: ../lib/linux/software/1password-deb.yml # 1Password for Ubuntu
      self_service: true
      setup_experience: true
      categories:
        - Security
      labels_include_any:
        - "Debian-based Linux hosts"
    - path: ../lib/linux/software/1password-rpm.yml # 1Password for RedHat
      self_service: true
      setup_experience: true
      categories:
        - Security
      labels_include_any:
        - "RPM-based Linux hosts"
    - path: ../lib/linux/software/zoom-deb.yml # Zoom for Ubuntu
      self_service: true
      setup_experience: true
      categories:
        - Communication
      labels_include_any:
        - "Debian-based Linux hosts"
    - path: ../lib/linux/software/zoom-rpm.yml # Zoom for RedHat
      self_service: true
      setup_experience: true
      categories:
        - Communication
      labels_include_any:
        - "RPM-based Linux hosts"
    - path: ../lib/linux/software/slack-deb.yml # Slack for Ubuntu
      self_service: true
      setup_experience: true
      categories:
        - Communication
      labels_include_any:
        - "Debian-based Linux hosts"
    - path: ../lib/linux/software/slack-rpm.yml # Slack for RedHat
      self_service: true
      setup_experience: true
      categories:
        - Communication
      labels_include_any:
        - "RPM-based Linux hosts"
